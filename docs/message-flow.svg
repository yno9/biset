<svg viewBox="0 0 820 980" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
<title>biset メッセージ送受信フロー</title>
<desc>受信と送信それぞれのファイル・関数レベルのフロー図</desc>

<style>
  text { fill: #1a1a1a; }
  .label { fill: #666; font-size:9px; }
  .file { fill: #f4f4f4; stroke: #d0d0d0; stroke-width:1; }
  .core { fill: #e8f0fe; stroke: #4a7ffe; stroke-width:1.5; }
  .connector { fill: #fef3e2; stroke: #f4a535; stroke-width:1.5; }
  .vault-box { fill: #e6f4ea; stroke: #34a853; stroke-width:1.5; }
  .arrow { stroke: #888; stroke-width:1.2; fill:none; marker-end:url(#arr); }
  .section-bg { fill: #fafafa; stroke: #e0e0e0; stroke-width:1; }
  .head { fill: #1a1a1a; font-size:12px; font-weight:bold; }
  .fn { fill: #555; font-size:9.5px; font-style:italic; }
</style>

<defs>
  <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
    <path d="M0,0 L7,3 L0,6 Z" fill="#888"/>
  </marker>
</defs>

<!-- ══ RECEIVE ═══════════════════════════════════════════════════════════ -->
<rect x="10" y="10" width="390" height="960" rx="8" class="section-bg"/>
<text x="205" y="35" text-anchor="middle" class="head">← 受信フロー</text>

<rect x="30" y="50" width="350" height="36" rx="4" class="connector"/>
<text x="205" y="66" text-anchor="middle" font-weight="bold">外部プロトコル</text>
<text x="205" y="79" text-anchor="middle" class="fn">IMAP IDLE / SMTP接続 / AP POST</text>

<rect x="30" y="108" width="160" height="52" rx="4" class="connector"/>
<text x="110" y="126" text-anchor="middle" font-weight="bold">biset-imap</text>
<text x="110" y="140" text-anchor="middle" class="fn">imap.go:imapWatch</text>
<text x="110" y="152" text-anchor="middle" class="fn">main.go:watchAccount</text>

<rect x="220" y="108" width="160" height="52" rx="4" class="connector"/>
<text x="300" y="126" text-anchor="middle" font-weight="bold">biset-smtp / biset-ap</text>
<text x="300" y="140" text-anchor="middle" class="fn">smtp/main.go:startSMTP</text>
<text x="300" y="152" text-anchor="middle" class="fn">ap/main.go:startHTTP</text>

<rect x="220" y="175" width="160" height="36" rx="4" class="connector"/>
<text x="300" y="190" text-anchor="middle" font-weight="bold">署名検証 (AP only)</text>
<text x="300" y="203" text-anchor="middle" class="fn">ap/httpsig.go:verifyHTTPSignature</text>

<rect x="30" y="175" width="160" height="36" rx="4" class="connector"/>
<text x="110" y="190" text-anchor="middle" font-weight="bold">Autocrypt 保存</text>
<text x="110" y="203" text-anchor="middle" class="fn">imap/autocrypt.go:processAutocrypt</text>

<rect x="120" y="233" width="160" height="30" rx="4" class="connector"/>
<text x="200" y="246" text-anchor="middle" font-weight="bold">notify("mail")</text>
<text x="200" y="259" text-anchor="middle" class="fn">→ stdout JSON-RPC</text>

<rect x="80" y="280" width="240" height="36" rx="4" class="core"/>
<text x="200" y="296" text-anchor="middle" font-weight="bold">connector.go</text>
<text x="200" y="309" text-anchor="middle" class="fn">readLoop → onChange() → runSync</text>

<rect x="60" y="338" width="280" height="30" rx="4" class="core"/>
<text x="200" y="351" text-anchor="middle" font-weight="bold">sync.go:runSync</text>
<text x="200" y="362" text-anchor="middle" class="fn">acquireSyncLock → fetch all connectors</text>

<rect x="90" y="390" width="220" height="30" rx="4" class="core"/>
<text x="200" y="403" text-anchor="middle" font-weight="bold">connector.go:Connector.Fetch</text>
<text x="200" y="415" text-anchor="middle" class="fn">JSON-RPC "fetch" → FetchResult</text>

<rect x="60" y="442" width="280" height="42" rx="4" class="core"/>
<text x="200" y="457" text-anchor="middle" font-weight="bold">sync.go (thread処理)</text>
<text x="200" y="470" text-anchor="middle" class="fn">AssignThreadIDs · DeduplicateEmails</text>
<text x="200" y="482" text-anchor="middle" class="fn">groupEmailsByInbox · mergeWithExisting</text>

<rect x="60" y="506" width="280" height="42" rx="4" class="vault-box"/>
<text x="200" y="521" text-anchor="middle" font-weight="bold">vault書き込み</text>
<text x="200" y="534" text-anchor="middle" class="fn">storage.go:WriteEmail · WriteThread</text>
<text x="200" y="546" text-anchor="middle" class="fn">render.go:WriteThreadMD · EnsureNewFile</text>

<line x1="205" y1="86" x2="205" y2="106" class="arrow"/>
<line x1="110" y1="160" x2="110" y2="173" class="arrow"/>
<line x1="300" y1="160" x2="300" y2="173" class="arrow"/>
<line x1="110" y1="211" x2="155" y2="231" class="arrow"/>
<line x1="300" y1="211" x2="245" y2="231" class="arrow"/>
<line x1="200" y1="263" x2="200" y2="278" class="arrow"/>
<line x1="200" y1="316" x2="200" y2="336" class="arrow"/>
<line x1="200" y1="368" x2="200" y2="388" class="arrow"/>
<line x1="200" y1="420" x2="200" y2="440" class="arrow"/>
<line x1="200" y1="484" x2="200" y2="504" class="arrow"/>

<!-- ══ SEND ══════════════════════════════════════════════════════════════ -->
<rect x="420" y="10" width="390" height="960" rx="8" class="section-bg"/>
<text x="615" y="35" text-anchor="middle" class="head">→ 送信フロー</text>

<rect x="440" y="50" width="350" height="36" rx="4" class="vault-box"/>
<text x="615" y="66" text-anchor="middle" font-weight="bold">人間が MD を編集</text>
<text x="615" y="79" text-anchor="middle" class="fn">status: send  または  !b</text>

<rect x="480" y="108" width="270" height="36" rx="4" class="core"/>
<text x="615" y="124" text-anchor="middle" font-weight="bold">sync.go:watchVault</text>
<text x="615" y="137" text-anchor="middle" class="fn">fsnotify → debounce 500ms → runSync</text>

<rect x="460" y="166" width="310" height="42" rx="4" class="core"/>
<text x="615" y="181" text-anchor="middle" font-weight="bold">actions.go:FlushOutgoing</text>
<text x="615" y="194" text-anchor="middle" class="fn">scan vault MD → flushMDSend per file</text>
<text x="615" y="206" text-anchor="middle" class="fn">frontmatter解析: contact/subject/protocol</text>

<rect x="480" y="230" width="270" height="30" rx="4" class="core"/>
<text x="615" y="243" text-anchor="middle" font-weight="bold">connector.go:ConnectorFor(protocol)</text>
<text x="615" y="256" text-anchor="middle" class="fn">manifest.protocols[] でルーティング</text>

<rect x="490" y="282" width="250" height="30" rx="4" class="core"/>
<text x="615" y="295" text-anchor="middle" font-weight="bold">connector.go:Connector.Send</text>
<text x="615" y="308" text-anchor="middle" class="fn">JSON-RPC "send" → subprocess</text>

<rect x="440" y="334" width="100" height="68" rx="4" class="connector"/>
<text x="490" y="351" text-anchor="middle" font-weight="bold">biset-imap</text>
<text x="490" y="365" text-anchor="middle" class="fn">smtp.go</text>
<text x="490" y="378" text-anchor="middle" class="fn">buildMessage</text>
<text x="490" y="391" text-anchor="middle" class="fn">sendSMTP</text>
<text x="490" y="403" text-anchor="middle" class="fn">appendToSent</text>

<rect x="560" y="334" width="100" height="68" rx="4" class="connector"/>
<text x="610" y="351" text-anchor="middle" font-weight="bold">biset-smtp</text>
<text x="610" y="365" text-anchor="middle" class="fn">main.go</text>
<text x="610" y="378" text-anchor="middle" class="fn">buildRaw</text>
<text x="610" y="391" text-anchor="middle" class="fn">injectAutocrypt</text>
<text x="610" y="403" text-anchor="middle" class="fn">encryptMessage</text>

<rect x="680" y="334" width="100" height="68" rx="4" class="connector"/>
<text x="730" y="351" text-anchor="middle" font-weight="bold">biset-ap</text>
<text x="730" y="365" text-anchor="middle" class="fn">main.go</text>
<text x="730" y="378" text-anchor="middle" class="fn">resolveActor</text>
<text x="730" y="391" text-anchor="middle" class="fn">sendToActor</text>
<text x="730" y="403" text-anchor="middle" class="fn">httpSignedPost</text>

<rect x="548" y="416" width="124" height="24" rx="3" class="connector"/>
<text x="610" y="432" text-anchor="middle" class="fn">dkim.go:signDKIM</text>

<rect x="440" y="462" width="350" height="30" rx="4" class="connector"/>
<text x="615" y="478" text-anchor="middle" font-weight="bold">外部サーバーへ配信</text>
<text x="615" y="488" text-anchor="middle" class="fn">SMTP MX lookup / AP remote inbox POST</text>

<rect x="460" y="514" width="310" height="42" rx="4" class="vault-box"/>
<text x="615" y="529" text-anchor="middle" font-weight="bold">送信済みをVaultに保存</text>
<text x="615" y="542" text-anchor="middle" class="fn">actions.go:WriteEmail → WriteThreadMD</text>
<text x="615" y="554" text-anchor="middle" class="fn">_new.md をリセット / status: → 空</text>

<line x1="615" y1="86" x2="615" y2="106" class="arrow"/>
<line x1="615" y1="144" x2="615" y2="164" class="arrow"/>
<line x1="615" y1="208" x2="615" y2="228" class="arrow"/>
<line x1="615" y1="260" x2="615" y2="280" class="arrow"/>
<line x1="615" y1="312" x2="490" y2="332" class="arrow"/>
<line x1="615" y1="312" x2="610" y2="332" class="arrow"/>
<line x1="615" y1="312" x2="730" y2="332" class="arrow"/>
<line x1="610" y1="402" x2="610" y2="414" class="arrow"/>
<line x1="490" y1="402" x2="490" y2="460" class="arrow"/>
<line x1="610" y1="440" x2="610" y2="460" class="arrow"/>
<line x1="730" y1="402" x2="730" y2="460" class="arrow"/>
<line x1="615" y1="492" x2="615" y2="512" class="arrow"/>

<!-- ══ SHARED: FlushActions ════════════════════════════════════════════ -->
<rect x="10" y="578" width="800" height="52" rx="6" class="core"/>
<text x="410" y="597" text-anchor="middle" font-weight="bold">actions.go:FlushActions  — seen / archived / deleted / spam</text>
<text x="410" y="612" text-anchor="middle" class="fn">status: seen → WriteEmail($seen=true) → WriteThreadMD</text>
<text x="410" y="624" text-anchor="middle" class="fn">status: archived/deleted → Connector.Handle(emailId, action) → DeleteEmail · DeleteThread · Remove MD</text>

<!-- ══ SHARED: Auth/Crypto ════════════════════════════════════════════ -->
<rect x="10" y="648" width="800" height="52" rx="6" class="core"/>
<text x="410" y="667" text-anchor="middle" font-weight="bold">auth.go (core)  ·  env vars → 全コネクタ</text>
<text x="410" y="682" text-anchor="middle" class="fn">BISET_KEY_PEM (RSA master)  ·  BISET_PGP_KEY (OpenPGP derived)  ·  BISET_PASSWORD  ·  BISET_VAULT</text>
<text x="410" y="694" text-anchor="middle" class="fn">loadOrGenerateKey  ·  derivePGPEntity (HKDF)  ·  loadPGPKey  ·  pgpPublicKeyBytes (WKD)</text>

<!-- ══ SHARED: Router ════════════════════════════════════════════ -->
<rect x="10" y="718" width="800" height="40" rx="6" class="core"/>
<text x="410" y="735" text-anchor="middle" font-weight="bold">router.go  — HTTP reverse proxy</text>
<text x="410" y="750" text-anchor="middle" class="fn">manifest.http_routes → connector port へ転送  ·  /.well-known/openpgpkey/policy  ·  /.well-known/openpgpkey/hu/&lt;hash&gt;</text>

<!-- ══ VAULT LAYOUT ════════════════════════════════════════════ -->
<rect x="10" y="776" width="800" height="80" rx="6" class="vault-box"/>
<text x="410" y="795" text-anchor="middle" font-weight="bold">Vault  —  /Users/n/inbox/</text>
<text x="90" y="815" text-anchor="middle" class="fn">.data/emails/*.json</text>
<text x="240" y="815" text-anchor="middle" class="fn">.data/threads/*.json</text>
<text x="390" y="815" text-anchor="middle" class="fn">.data/mailboxes.json</text>
<text x="550" y="815" text-anchor="middle" class="fn">.autocrypt/*.pgp + *.prefer</text>
<text x="720" y="815" text-anchor="middle" class="fn">.data/.biset.lock</text>
<text x="90" y="832" text-anchor="middle" class="fn">storage.go</text>
<text x="240" y="832" text-anchor="middle" class="fn">storage.go</text>
<text x="390" y="832" text-anchor="middle" class="fn">storage.go</text>
<text x="550" y="832" text-anchor="middle" class="fn">imap·smtp/autocrypt.go</text>
<text x="720" y="832" text-anchor="middle" class="fn">process.go</text>
<text x="410" y="848" text-anchor="middle" class="fn">{account}/*.md  ←→  render.go:WriteThreadMD / ParseFrontmatter</text>

