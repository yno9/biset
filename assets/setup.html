<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biset setup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: monospace;
    background: #e8f5e9;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 280px;
  }
  .screen.active { display: flex; }
  img#logo { width: 128px; height: 128px; cursor: pointer; margin-bottom: 8px; }
  .btn {
    width: 100%; padding: 12px;
    border: none; border-radius: 8px;
    background: #f5f5f5; color: #000;
    font-size: 18px; font-weight: 700; font-family: monospace;
    cursor: pointer; outline: none;
  }
  .btn:hover { background: #ebebeb; }
  .btn-sm { font-size: 13px; padding: 10px; }
  .btn-back { background: none; color: #aaa; }
  .btn-back:hover { background: none; color: #666; }
  .btn-next { background: #ccc; color: #fff; }
  .btn-next:hover { background: #bbb; }
  .btn-next.active { background: #2d5a3d; }
  .btn-next.active:hover { background: #244d33; }
  input {
    width: 100%; padding: 10px;
    border: none; border-radius: 8px;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #000;
    font-size: 14px; font-family: monospace;
    outline: none; transition: background 0.15s;
  }
  input:focus { background: rgba(255,255,255,0.75); }
  .error { font-size: 12px; color: #ff4444; display: none; }
  .muted { font-size: 12px; color: #999; cursor: pointer; text-decoration: underline; }
  .preview-row {
    display: flex; justify-content: space-between;
    padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.08);
    font-size: 13px; width: 100%;
  }
  .question { font-size: 16px; font-weight: 700; margin-bottom: 8px; text-align: left; width: 100%; }
  .btns { display: flex; gap: 8px; width: 100%; }
  textarea {
    width: 100%; height: 180px;
    border: none; border-radius: 8px;
    background: #fff; color: #000;
    font-size: 12px; font-family: monospace;
    padding: 8px; resize: vertical; outline: none;
  }
  .screen-header {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; margin-bottom: 0;
  }
  .next-btn {
    background: none; border: none; cursor: pointer; outline: none;
    font-size: 20px; font-weight: 700; font-family: monospace;
    color: #ccc; transition: color 0.15s;
    margin-top: 24px;
  }
  .next-btn.active { color: #000; }
  .connector-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px; border-radius: 8px;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    cursor: pointer; font-size: 14px; width: 100%;
  }
  .connector-row input[type=checkbox] { accent-color: #000; width: 15px; height: 15px; flex-shrink: 0; }
  .connector-row:has(input:checked) { background: rgba(255,255,255,0.75); }
  .connector-status { font-size: 11px; color: #aaa; margin-left: auto; flex-shrink: 0; display: flex; align-items: center; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid #ddd; border-top-color: #999;
    animation: spin 0.7s linear infinite; display: none; }
  .connector-sub { font-size: 11px; color: #999; }
  #btn-select, #btn-launch, #btn-vault-done { transition: opacity 0.15s; opacity: 0.9; }
  #btn-select:hover, #btn-launch:hover, #btn-vault-done:hover { opacity: 0.7; }
  .arch-chip {
    font-size: 10px; font-family: monospace; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; cursor: pointer;
    border: none; outline: none; background: none;
    color: #ccc; transition: color 0.15s;
  }
  .arch-chip.active { color: #333; }
</style>
<script src="setup.js"></script>
</head>

<!-- Screen 1b: Already set up -->
<div id="screen-already" class="screen">
  <p style="font-size:14px;font-family:monospace;color:#888;text-align:center;line-height:1.6">Already set up.</p>
  <a id="btn-reset" class="muted" style="margin-top:12px">Reinstall?</a>
</div>

<!-- Screen 1c: Relaunch -->
<div id="screen-relaunch" class="screen">
  <p style="font-size:14px;font-family:monospace;color:#888;text-align:center;line-height:1.8">
    Config deleted.<br>Restart biset to continue.
  </p>
</div>

<!-- Screen 2: Connector selection -->
<div id="screen-connectors" class="screen">
  <div style="display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:8px">
    <p class="question" style="margin:0">Connectors</p>
    <div id="arch-selector" style="display:flex;gap:2px"></div>
  </div>
  <div id="connector-list" style="width:100%"></div>
  <div class="btns" style="margin-top:24px;justify-content:flex-end;gap:8px">
    <button class="btn btn-sm btn-back" id="btn-connectors-back" style="width:auto;padding:10px 20px">back</button>
    <button class="btn btn-sm btn-next" id="btn-connectors-next" style="width:auto;padding:10px 20px">next</button>
  </div>
</div>

<!-- Screen 3: Account setup (IMAP) -->
<div id="screen-account" class="screen">
  <p class="question">IMAP Account</p>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <div class="btns" style="margin-top:24px;justify-content:flex-end;gap:8px">
    <button class="btn btn-sm btn-back" id="btn-account-back" style="width:auto;padding:10px 20px">back</button>
    <button class="btn btn-sm btn-next" id="btn-setup" style="width:auto;padding:10px 20px">next</button>
  </div>
  <p class="error" id="err-account"></p>
</div>

<!-- Screen 3b: Interface -->
<div id="screen-interface" class="screen">
  <p class="question">Interface</p>
  <div id="interface-list"></div>
  <div class="btns" style="margin-top:24px;justify-content:flex-end;gap:8px">
    <button class="btn btn-sm btn-back" id="btn-interface-back" style="width:auto;padding:10px 20px">back</button>
    <button class="btn btn-sm btn-next active" id="btn-interface-next" style="width:auto;padding:10px 20px">next</button>
  </div>
</div>

<!-- Screen 4: Connecting -->
<div id="screen-connecting" class="screen">
  <p style="font-size:14px">Connecting<span id="connecting-dots" style="display:inline-block;width:18px;text-align:left"></span></p>
</div>

<!-- Screen 5: Preview + choice -->
<div id="screen-preview" class="screen">
  <p id="dl-text" class="question" style="font-size:13px;color:#666">Email data fetching<span id="dl-dots" style="display:inline-block;width:18px;text-align:left"></span></p>
  <div id="preview-rows" style="width:100%;margin-bottom:8px"></div>
  <div class="btns" id="preview-actions" style="visibility:hidden;margin-top:24px;justify-content:flex-end;gap:8px">
    <button class="btn btn-sm btn-back" id="btn-preview-back" style="width:auto;padding:10px 20px">back</button>
    <button class="btn btn-sm btn-next active" id="btn-start" style="width:auto;padding:10px 20px">next</button>
  </div>
</div>

<!-- Screen 6: Error -->
<div id="screen-error" class="screen">
  <p class="error" id="err-connect" style="display:block"></p>
  <a class="muted" id="link-edit">edit config</a>
</div>

<!-- Screen 6b: Edit config -->
<div id="screen-edit" class="screen" style="width:320px">
  <textarea id="cfg-text" style="width:100%;height:240px;font-size:12px;font-family:monospace;padding:10px;border:none;border-radius:8px;background:rgba(255,255,255,0.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:#000;resize:vertical;outline:none;box-sizing:border-box"></textarea>
  <div class="btns" style="justify-content:flex-end;gap:8px">
    <button class="btn btn-sm btn-back" id="btn-edit-back" style="width:auto;padding:10px 20px">back</button>
    <button class="btn btn-sm btn-next active" id="btn-edit-save" style="width:auto;padding:10px 20px">retry</button>
  </div>
  <p class="error" id="err-edit"></p>
</div>

<!-- Screen 7: Launch -->
<div id="screen-launch" class="screen">
  <p class="question">Launch biset?</p>
  <div class="btns" style="justify-content:center;gap:8px;margin-top:8px">
    <button class="btn btn-sm btn-back" id="btn-launch-no" style="width:auto;padding:10px 24px">back</button>
    <button class="btn btn-sm btn-next active" id="btn-launch" style="width:auto;padding:10px 24px">yes</button>
  </div>
</div>

<script>
// Render connector/interface rows from BISET_URLS definitions.
function renderConnectorRow(item, nameAttr) {
  const label = document.createElement('label')
  label.className = 'connector-row'
  label.innerHTML = `
    <input type="checkbox" name="${nameAttr}" value="${item.id}"${item.checked ? ' checked' : ''}>
    <div>
      <div>${item.label}</div>
      <div class="connector-sub">${item.sub}</div>
    </div>
    <span class="connector-status" data-connector="${item.id}">
      <div class="spinner" data-ring="${item.id}"></div>
      <span class="status-text"></span>
    </span>`
  return label
}

document.getElementById('connector-list').append(
  ...BISET_URLS.connectors.map(c => renderConnectorRow(c, 'connector'))
)
if (BISET_URLS.interfaces?.length) {
  document.getElementById('interface-list').append(
    ...BISET_URLS.interfaces.map(c => renderConnectorRow(c, 'interface'))
  )
}

let dirHandle = null

// Detect vault dir from current file location
const _rawDir = decodeURIComponent(location.pathname.substring(0, location.pathname.lastIndexOf('/')))
const _home = location.pathname.match(/^(\/Users\/[^/]+)/)?.[1] ?? ''
const vaultDir = _home ? _rawDir.replace(_home, '~') : _rawDir
const label = document.getElementById('vault-dir-label')
if (label) label.style.display = 'none'

// Dot animation
let dotInterval = null
function startDots() {
  let n = 1
  const el = document.getElementById('connecting-dots')
  if (!el) return
  clearInterval(dotInterval)
  dotInterval = setInterval(() => { el.textContent = '.'.repeat(n); n = n % 3 + 1 }, 400)
}

let dlDotInterval = null
function startDlDots() {
  let n = 1
  const el = document.getElementById('dl-dots')
  if (!el) return
  clearInterval(dlDotInterval)
  dlDotInterval = setInterval(() => { el.textContent = '.'.repeat(n); n = n % 3 + 1 }, 400)
}

function show(id) {
  if (id === 'screen-connecting') startDots()
  else if (id === 'screen-preview') startDlDots()
  else clearInterval(dotInterval)
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

async function openDir() {
  try { dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' }); return true }
  catch { return false }
}

async function writeFile(path, content) {
  const parts = path.split('/')
  let handle = dirHandle
  for (let i = 0; i < parts.length - 1; i++) {
    handle = await handle.getDirectoryHandle(parts[i], { create: true })
  }
  const fh = await handle.getFileHandle(parts[parts.length - 1], { create: true })
  const w = await fh.createWritable()
  await w.write(content)
  await w.close()
}

async function readFile(path) {
  try {
    const parts = path.split('/')
    let handle = dirHandle
    for (let i = 0; i < parts.length - 1; i++) {
      handle = await handle.getDirectoryHandle(parts[i])
    }
    const fh = await handle.getFileHandle(parts[parts.length - 1])
    return await (await fh.getFile()).text()
  } catch { return null }
}

async function deleteFile(name) {
  try { await dirHandle.removeEntry(name) } catch {}
}

const _interfaceIds = new Set((BISET_URLS.interfaces ?? []).map(i => i.id))
function selectedConnectors() {
  return [...document.querySelectorAll('input[name=connector]:checked')]
    .map(el => el.value)
    .filter(v => !_interfaceIds.has(v))
}

// Screen 1: Open vault

  const ok = await openDir()

  const check = await readFile('biset')
  if (!check) {
    document.getElementById('vault-err').style.display = 'block'

    return

  document.getElementById('vault-err').style.display = 'none'

    return

// Downloaded connector binaries (stored in memory until start)
const connectorBuffers = {}
const connectorState = {} // 'idle' | 'downloading' | 'ok' | 'error'

function getRing(name) {
  return document.querySelector(`.spinner[data-ring="${name}"]`)
}
function getStatusText(name) {
  const el = document.querySelector(`.connector-status[data-connector="${name}"]`)
  return el ? el.querySelector('.status-text') : null
}

function setRingProgress(name, ratio) {
  const ring = getRing(name)
  if (!ring) return
  const circle = ring.querySelector('circle')
  const circumference = 44
  ring.style.display = ratio >= 0 ? 'block' : 'none'
  circle.style.strokeDashoffset = circumference * (1 - Math.min(ratio, 1))
}

function setConnectorStatus(name, state, progress) {
  const text = getStatusText(name)
  const ring = getRing(name)
  if (!text || !ring) return
  if (state === 'downloading') {
    ring.style.display = 'block'
    text.textContent = ''
  } else if (state === 'ok') {
    ring.style.display = 'none'
    text.textContent = '✓'; text.style.color = '#555'
  } else {
    ring.style.display = 'none'
    text.textContent = ''
  }
}

// arch chips: label → { os, arch }
const ARCH_CHIPS = [
  { label: 'arm',   os: 'darwin', arch: 'arm64' },
  { label: 'amd',   os: 'darwin', arch: 'amd64' },
  { label: 'linux', os: 'linux',  arch: 'amd64' },
]

function detectOSArch() {
  const ua = navigator.userAgent
  let os = 'darwin'
  if (/Win/i.test(ua)) os = 'windows'
  else if (/Linux/i.test(ua)) os = 'linux'
  let arch = 'amd64'
  if (/arm64|aarch64/i.test(ua)) arch = 'arm64'
  if (navigator.userAgentData?.platform) {
    const p = navigator.userAgentData.platform.toLowerCase()
    if (p.includes('arm')) arch = 'arm64'
  }
  return { os, arch }
}

let _selectedArch = null  // { os, arch }

function initArchSelector() {
  const auto = detectOSArch()
  _selectedArch = auto
  const container = document.getElementById('arch-selector')
  container.innerHTML = ''
  for (const chip of ARCH_CHIPS) {
    const btn = document.createElement('button')
    btn.className = 'arch-chip' + (chip.os === auto.os && chip.arch === auto.arch ? ' active' : '')
    btn.textContent = chip.label
    btn.onclick = () => {
      _selectedArch = { os: chip.os, arch: chip.arch }
      container.querySelectorAll('.arch-chip').forEach((b, i) => {
        b.classList.toggle('active', ARCH_CHIPS[i].os === chip.os && ARCH_CHIPS[i].arch === chip.arch)
      })
    }
    container.appendChild(btn)
  }
}

function connectorDownloadURL(name) {
  const all = [...BISET_URLS.connectors, ...(BISET_URLS.interfaces ?? [])]
  const entry = all.find(c => c.id === name)
  if (entry?.url) return entry.url
  const { os, arch } = _selectedArch || detectOSArch()
  return `https://github.com/${BISET_URLS.github_repo}/releases/latest/download/${name}-${os}-${arch}`
}

async function connectorExists(name) {
  try {
    const connDir = await dirHandle.getDirectoryHandle('connectors', { create: false })
    const nameDir = await connDir.getDirectoryHandle(name, { create: false })
    await nameDir.getFileHandle(name, { create: false })
    return true
  } catch { return false }
}

async function downloadConnector(name) {
  if (!name) { console.error('downloadConnector: empty name', new Error().stack); return }
  if (connectorState[name] === 'ok') return
  // check if already downloaded
  if (await connectorExists(name)) {
    connectorState[name] = 'ok'
    setConnectorStatus(name, 'ok')
    updateConnectorBtn()
    return
  }
  connectorState[name] = 'downloading'
  setConnectorStatus(name, 'downloading')

  // signal Go to download the binary
  await writeFile(`biset-dl-${name}.json`, JSON.stringify({ name, url: connectorDownloadURL(name) }))

  // poll for completion
  const start = Date.now()
  while (Date.now() - start < 120000) {
    const text = await readFile(`biset-dl-${name}-done.json`)
    if (text) {
      await deleteFile(`biset-dl-${name}-done.json`)
      const data = JSON.parse(text)
      if (data.ok) {
        connectorState[name] = 'ok'
        setConnectorStatus(name, 'ok')
        updateConnectorBtn()
        return
      }
    }
    await new Promise(r => setTimeout(r, 500))
  }
}

async function deleteConnector(name) {
  try {
    const connDir = await dirHandle.getDirectoryHandle('connectors', { create: false })
    await connDir.removeEntry(name, { recursive: true })
  } catch {}
  connectorState[name] = undefined
}

async function onConnectorChange(el) {
  const name = el.value
  if (!name) return
  if (!el.checked) {
    setConnectorStatus(name, 'none')
    await deleteConnector(name)
    updateConnectorBtn()
    return
  }
  if (connectorState[name] === 'ok') { setConnectorStatus(name, 'ok'); return }
  await downloadConnector(name)
}

// Screen 2: Connector selection — update active state
function updateConnectorBtn() {
  const selected = [...document.querySelectorAll('input[name=connector]:checked')].map(el => el.value)
  const allDone = selected.length > 0 && selected.every(name => connectorState[name] === 'ok')
  document.getElementById('btn-connectors-next').classList.toggle('active', allDone)
}
document.querySelectorAll('input[name=connector]').forEach(el => {
  el.addEventListener('change', () => { updateConnectorBtn(); onConnectorChange(el) })
})
updateConnectorBtn()

// Screen 3: Account setup (IMAP)
async function doSetup() {
  const email = document.getElementById('email').value.trim()
  const pass = document.getElementById('password').value
  const errEl = document.getElementById('err-account')
  if (!email || !pass) { errEl.textContent = 'Email and password are required'; errEl.style.display = 'block'; return }
  errEl.style.display = 'none'

  // MX lookup
  let imapHost = `imap.${email.split('@')[1]}`
  let smtpHost = `smtp.${email.split('@')[1]}`
  try {
    const domain = email.split('@')[1]
    const res = await fetch(`https://dns.google/resolve?name=${encodeURIComponent(domain)}&type=MX`)
    const data = await res.json()
    const mx = (data.Answer ?? []).map(a => a.data).sort()[0]
    if (mx) { const host = mx.replace(/^\d+\s+/, '').replace(/\.$/, ''); imapHost = host; smtpHost = host }
  } catch {}

  window._imapConnectorCfg = {
    accounts: [{
      inbox_key: email,
      imap: { host: imapHost, port: 993, tls_mode: 'tls', username: email, password: pass },
      smtp: { host: smtpHost, port: 587, tls_mode: 'starttls', username: email, password: pass }
    }]
  }

  // write connector config now so it's editable on error
  await writeFile('connectors/biset-imap/config.json', JSON.stringify(window._imapConnectorCfg, null, 2))

  await finishSetup()
}

function checkAccountFields() {
  const ok = !!(document.getElementById('email').value.trim() && document.getElementById('password').value)
  document.getElementById('btn-setup').classList.toggle('active', ok)
}
document.getElementById('email').addEventListener('input', checkAccountFields)
document.getElementById('password').addEventListener('input', checkAccountFields)
document.getElementById('email').addEventListener('keydown', e => e.key === 'Enter' && document.getElementById('password').focus())
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('btn-setup').classList.contains('active')) doSetup()
})
document.getElementById('btn-setup').addEventListener('click', () => {
  if (document.getElementById('btn-setup').classList.contains('active')) doSetup()
})

async function finishSetup() {
  // pass credentials in trigger file — no files written to disk until start
  const payload = { connectors: selectedConnectors() }
  if (window._imapConnectorCfg) payload.imap_connector = window._imapConnectorCfg
  await writeFile('biset-connecting.json', JSON.stringify(payload))
  show('screen-connecting')
  const status = await pollStatus()
  if (status.ok) {
    showPreview(status.preview)
  } else {
    document.getElementById('err-connect').textContent = status.message || 'Connection failed'
    show('screen-error')
  }
}

async function pollStatus(timeoutMs = 60000) {
  const start = Date.now()
  while (Date.now() - start < timeoutMs) {
    const text = await readFile('biset-status.json')
    if (text) {
      await deleteFile('biset-status.json')
      const data = JSON.parse(text)
      return { ok: data.status === 'ok', message: data.message, preview: data.preview }
    }
    await new Promise(r => setTimeout(r, 500))
  }
  return { ok: false, message: 'Timeout: could not connect' }
}

function showPreview(preview) {
  const keys = ['inbox', 'sent'].filter(k => preview?.[k] != null)
  const rows = document.getElementById('preview-rows')
  rows.innerHTML = keys.map(k =>
    `<div class="preview-row"><span>${k.charAt(0).toUpperCase()+k.slice(1)}</span><span id="count-${k}">0</span></div>`
  ).join('')
  show('screen-preview')

  let done = 0
  keys.forEach((k, i) => {
    const target = preview[k]
    const el = document.getElementById('count-' + k)
    const duration = 800, steps = 30
    let current = 0
    setTimeout(() => {
      const iv = setInterval(() => {
        current = Math.min(current + target / steps, target)
        el.textContent = Math.round(current).toLocaleString()
        if (current >= target) {
          clearInterval(iv)
          done++
          if (done === keys.length) setTimeout(() => {
            clearInterval(dlDotInterval)
            document.getElementById('dl-text').innerHTML = 'Email data ready to sync:'
            document.getElementById('preview-actions').style.visibility = 'visible'
          }, 400)
        }
      }, duration / steps)
    }, i * 300)
  })
  if (keys.length === 0) setTimeout(() => {
    clearInterval(dlDotInterval)
    document.getElementById('preview-actions').style.visibility = 'visible'
  }, 600)
}

document.getElementById('btn-ui-done')?.addEventListener('click', async () => {
  const INDEX_HTML_URL = (BISET_URLS.interfaces ?? []).find(i => i.id === 'biset-ui')?.url
  show('screen-connecting')
  document.querySelector('#screen-connecting p').innerHTML =
    'Downloading<span id="connecting-dots" style="display:inline-block;width:18px;text-align:left"></span>'
  startDots()
  try {
    const res = await fetch(INDEX_HTML_URL)
    if (!res.ok) throw new Error('HTTP ' + res.status)
    await writeFile('index.html', await res.text())
    clearInterval(dotInterval)
    const p = document.querySelector('#screen-connecting p')
    p.innerHTML = 'Downloaded.'
    const next = document.createElement('button')
    next.className = 'btn'; next.style.marginTop = '16px'; next.textContent = 'Next'
    next.addEventListener('click', () => { window.location.href = 'index.html' })
    p.parentElement.appendChild(next)
  } catch(e) {
    show('screen-error')
    document.getElementById('err-connect').innerHTML = 'Failed to download interface<br>' + e.message
  }
})

  try {
    const connDir = await dirHandle.getDirectoryHandle('connectors', { create: false })
    for await (const [name] of connDir.entries()) {
      await connDir.removeEntry(name, { recursive: true }).catch(() => {})
    }
  } catch {}
  await writeFile('biset-quit.json', '{}')
  show('screen-relaunch')
})
