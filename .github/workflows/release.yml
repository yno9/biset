name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build biset
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
        run: go build -ldflags "-X main.version=$VERSION" -o biset-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Build relays
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
        run: |
          for relay in ap-host claude-client imapsmtp-client rss-client smtp-host; do
            go build -ldflags "-X main.version=$VERSION" \
              -o relays/$relay/biset-$relay-${{ matrix.goos }}-${{ matrix.goarch }} \
              ./relays/$relay
          done

      - name: Upload biset binary
        uses: softprops/action-gh-release@v3
        with:
          files: biset-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload relay binaries
        uses: softprops/action-gh-release@v3
        with:
          files: |
            relays/ap-host/biset-ap-host-${{ matrix.goos }}-${{ matrix.goarch }}
            relays/claude-client/biset-claude-client-${{ matrix.goos }}-${{ matrix.goarch }}
            relays/imapsmtp-client/biset-imapsmtp-client-${{ matrix.goos }}-${{ matrix.goarch }}
            relays/rss-client/biset-rss-client-${{ matrix.goos }}-${{ matrix.goarch }}
            relays/smtp-host/biset-smtp-host-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload shared assets
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            relays/imapsmtp-client/config.example.json
            relays/claude-client/config.example.json
            relays/rss-client/config.example.json
            relays/smtp-host/config.example.json
            scripts/install.sh
