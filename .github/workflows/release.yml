name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.21'

      - name: Build biset
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
        run: go build -ldflags "-X main.version=$VERSION" -o biset-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Build imapsmtp-client relay
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
        run: |
          cd relays/imapsmtp-client
          go build -ldflags "-X main.version=$VERSION" -o imapsmtp-client-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload binaries
        uses: softprops/action-gh-release@v3
        with:
          files: |
            biset-${{ matrix.goos }}-${{ matrix.goarch }}
            relays/imapsmtp-client/imapsmtp-client-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload shared assets
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            relays/imapsmtp-client/config.example.json
            scripts/install.sh
