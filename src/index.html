<script>
/* Home-screen-app (standalone) detection. iOS launched via the legacy
   apple-mobile-web-app-capable meta (we have no web manifest) does NOT match
   @media (display-mode: standalone) — it exposes navigator.standalone instead.
   Set a class so the notch/Dynamic-Island CSS keys off this, not the unreliable
   media query. Runs in <head> before first paint, so no layout flash. */
if (navigator.standalone === true || (window.matchMedia && matchMedia('(display-mode: standalone)').matches)) {
  document.documentElement.classList.add('pwa-standalone');
}
</script>

<div id="overlay" style="display:none">

    <div style="font-size:18px;font-weight:600">biset</div>
    <div style="color:var(--text-dim);font-size:14px">Select your vault directory to get started</div>
    <button id="local-open-btn" style="padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer">Open vault</button>
  </div>
  <div id="owner-info">
    <div id="owner-avatar"></div>
    <div id="owner-msg"></div>
  </div>
  <div class="field-group">
    <div class="field-label">name</div>
    <div id="inbox-slots" style="display:flex;gap:28px"></div>
    <div id="inbox-cursor"></div>
    <div id="overlay-inbox-label" style="display:none"></div>
  </div>
  <div id="overlay-msg" style="display:none"></div>
  <div id="relay-status"></div>
  <form id="pin-form" autocomplete="on" style="display:contents">
    <input id="pin-username" type="text" name="username" autocomplete="username" style="display:none">
    <input id="pin-hidden" type="password" name="password" autocomplete="current-password" style="display:none">
    <div id="pw-inline" style="display:none; gap:8px; align-items:center;">
      <input id="pw-inline-input" type="password" placeholder="PASSWORD" autocomplete="current-password">
    </div>
    <div class="field-group" id="code-group">
      <div class="field-label" id="code-label">code</div>
      <div id="pin-digits">
        <input class="slot-input" type="text" inputmode="numeric" maxlength="1">
        <input class="slot-input" type="text" inputmode="numeric" maxlength="1">
        <input class="slot-input" type="text" inputmode="numeric" maxlength="1">
        <input class="slot-input" type="text" inputmode="numeric" maxlength="1">
      </div>
    </div>
    <div id="pw-error"></div>
  </form>
  <button id="enter-btn" type="button">Enter</button>
</div>

<div id="pw-overlay">
  <div id="pw-overlay-inbox"></div>
  <div id="pw-overlay-msg">Enter your password</div>
  <div id="pw-input-wrap">
    <input id="pw-input" type="password" placeholder="Password" autocomplete="current-password">

  </div>

</div>

    <div style="display:flex;align-items:center;border-radius:8px;border:1px solid var(--header-border);background:var(--input-bg);overflow:hidden">
      <input id="nu-password" type="text" placeholder="password" autocomplete="current-password" style="flex:1;min-width:0;padding:10px 14px;border:none;background:transparent;color:var(--text);font-size:15px;font-family:inherit;outline:none">
      <button id="nu-pw-copy" type="button" style="padding:0 12px;height:100%;border:none;background:transparent;color:var(--text-dim);cursor:pointer;display:flex;align-items:center" aria-label="copy">

    <div style="display:flex;justify-content:flex-end;align-items:flex-start;gap:4px;margin:-1px 6px 0 0;color:var(--accent2);font-family:'Caveat',cursive;transform:rotate(-2deg)">

      <span style="font-size:21px;font-weight:600;line-height:1.1;margin-top:2px">Remember your password</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px">
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-dim);cursor:pointer;user-select:none">
        <input id="nu-tos" type="checkbox" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none">
        <span id="nu-tos-icon" style="flex-shrink:0;opacity:0.3;transition:opacity .15s;line-height:0">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="9" cy="9" r="8.5" stroke="currentColor"/><polyline points="5,9 8,12 13,6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </span>
        I agree to <a href="https://biset.md/tos" rel="noopener" style="color:var(--text-dim);font-weight:bold;">Terms of Beta-testing</a>.
      </label>
      <button id="nu-submit" type="button" style="padding:10px 12px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0">Start</button>
    </div>
    <div id="nu-error" style="color:#ff3b30;font-size:13px;display:none;min-height:18px;text-align:center"></div>
    <div id="nu-restore-toggle" style="text-align:center;font-size:13px;color:var(--text-dim);cursor:pointer;margin-top:2px;text-decoration:underline;text-underline-offset:2px">Restore with recovery phrase</div>
    <div id="nu-restore-box" style="display:none;flex-direction:column;gap:10px;margin-top:6px">
      <textarea id="nu-restore-phrase" rows="3" placeholder="Enter your 24-word recovery phrase" autocomplete="off" autocapitalize="off" spellcheck="false" style="width:100%;box-sizing:border-box;padding:10px 12px;border-radius:8px;border:1px solid var(--header-border);background:var(--input-bg);color:var(--text);font-size:14px;font-family:inherit;resize:vertical;outline:none"></textarea>

</div>
